<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Booking Confirmation - MeetMe</title>
    <link rel="stylesheet" href="/static/style.css" />
  </head>
  <body>
    <nav class="navbar">
      <div class="nav-inner">
        <a href="/dashboard.html" class="nav-brand"><span class="brand-icon">&#x27F3;</span> MeetMe</a>
        <div class="nav-links" id="nav-auth" hidden>
          <a href="/create-meeting.html" class="btn btn-sm btn-outline-white">+ New Meeting</a>
          <span class="nav-user" id="nav-username"></span>
          <a href="#" class="nav-link" id="logout-link">Log out</a>
        </div>
      </div>
    </nav>

    <div id="flash-container" class="flash-container"></div>

    <main class="main-content">
      <div class="form-page">
        <div class="form-card">
          <h1>Booking Confirmation</h1>
          <p class="text-muted" id="confirmation-subtitle">Loading booking details...</p>

          <div id="confirmation-details" class="form-group booking-confirmation-details" hidden></div>

          <div id="confirmation-actions" class="form-actions booking-confirmation-actions" hidden>
            <button id="cancel-booking-btn" class="btn btn-danger" type="button">Cancel Booking</button>
          </div>

          <div class="form-actions">
            <a class="btn btn-ghost" href="/dashboard.html">Back to Dashboard</a>
          </div>
        </div>
      </div>
    </main>

    <footer class="footer" data-shared-footer></footer>

    <script src="/static/layout.js"></script>
    <script src="/static/common.js"></script>
    <script src="/static/booking-confirmation.js" defer></script>
  </body>
</html>
