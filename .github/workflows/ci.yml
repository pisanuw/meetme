name: CI

on:
  push:
    branches: ["**"]
  pull_request:

jobs:
  test-default:
    name: Test (default mode)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npm test

  test-rate-limit-on:
    name: Test (rate limit enabled)
    runs-on: ubuntu-latest
    env:
      TEST_RATE_LIMIT_MODE: on
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npm test
