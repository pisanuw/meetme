<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Admin – MeetMe</title>
    <link rel="stylesheet" href="/static/style.css" />
  </head>
  <body>
    <nav class="navbar">
      <div class="nav-inner">
        <a href="/dashboard.html" class="nav-brand">
          <span class="brand-icon">&#x27F3;</span> MeetMe
        </a>
        <div class="nav-links" id="nav-auth" hidden>
          <a href="/create-meeting.html" class="btn btn-sm btn-outline-white">+ New Meeting</a>
          <span class="nav-user" id="nav-username"></span>
          <a href="#" class="nav-link" id="logout-link">Log out</a>
        </div>
      </div>
    </nav>

    <div id="flash-container" class="flash-container"></div>

    <main class="main-content">
      <div class="admin-page" id="admin-page" hidden>
        <div class="admin-page-header">
          <h1 class="admin-page-title">Admin Panel</h1>
          <span class="badge-admin">Admin</span>
        </div>

        <!-- Tab Bar -->
        <div class="admin-tabs" id="admin-tabs">
          <button class="admin-tab active" data-tab="stats">&#x1F4CA; Stats</button>
          <button class="admin-tab" data-tab="users">&#x1F465; Users</button>
          <button class="admin-tab" data-tab="meetings">&#x1F4C5; Meetings</button>
          <button class="admin-tab" data-tab="events">&#x1F4CB; Event Log</button>
        </div>

        <!-- ===== STATS ===== -->
        <div id="tab-stats" class="tab-panel">
          <div class="stats-grid" id="stats-grid">
            <div class="stat-card">
              <div class="stat-value" id="stat-users">—</div>
              <div class="stat-label">Users</div>
            </div>
            <div class="stat-card">
              <div class="stat-value" id="stat-meetings">—</div>
              <div class="stat-label">Meetings</div>
            </div>
            <div class="stat-card">
              <div class="stat-value" id="stat-events">—</div>
              <div class="stat-label">Log events</div>
            </div>
          </div>
        </div>

        <!-- ===== USERS ===== -->
        <div id="tab-users" class="tab-panel" hidden>
          <div class="admin-filter-row">
            <input
              type="text"
              id="user-search"
              class="form-control"
              placeholder="Filter by name or email…"
              class="admin-search-input"
            />
            <button class="btn btn-ghost" id="create-user-btn">+ Create user</button>
          </div>
          <div class="admin-table-wrap">
            <table class="admin-table" id="users-table">
              <thead>
                <tr>
                  <th>Email</th>
                  <th>Name</th>
                  <th>Role</th>
                  <th>Time zone</th>
                  <th>Joined</th>
                  <th>Cal</th>
                  <th>Actions</th>
                </tr>
              </thead>
              <tbody id="users-tbody"></tbody>
            </table>
          </div>
          <div class="admin-pagination" id="users-pagination"></div>
        </div>

        <!-- ===== MEETINGS ===== -->
        <div id="tab-meetings" class="tab-panel" hidden>
          <div class="admin-table-wrap">
            <table class="admin-table" id="meetings-table">
              <thead>
                <tr>
                  <th>Title</th>
                  <th>Creator</th>
                  <th>Type</th>
                  <th>TZ</th>
                  <th>Invitees</th>
                  <th>Finalized</th>
                  <th>Created</th>
                </tr>
              </thead>
              <tbody id="meetings-tbody"></tbody>
            </table>
          </div>
          <div class="admin-pagination" id="meetings-pagination"></div>
        </div>

        <!-- ===== EVENTS LOG ===== -->
        <div id="tab-events" class="tab-panel" hidden>
          <div class="admin-filter-row admin-filter-row-aligned">
            <input
              type="text"
              id="event-search"
              class="form-control"
              placeholder="Filter events…"
              class="admin-search-input"
            />
            <button class="btn btn-ghost" id="refresh-events-btn">&#x21BB; Refresh</button>
          </div>
          <div class="admin-table-wrap">
            <table class="admin-table" id="events-table">
              <thead>
                <tr>
                  <th>Time</th>
                  <th>Level</th>
                  <th>Function</th>
                  <th>Message</th>
                  <th>Details</th>
                </tr>
              </thead>
              <tbody id="events-tbody"></tbody>
            </table>
          </div>
        </div>
      </div>
      <!-- /admin-page -->
    </main>

    <!-- User modal -->
    <div id="user-modal" class="modal-backdrop" hidden>
      <div class="modal-card">
        <div class="modal-header">
          <h2 id="modal-title">Edit User</h2>
          <button class="modal-close" id="user-modal-close-btn">&times;</button>
        </div>
        <form id="user-form" class="auth-form">
          <div class="form-row">
            <div class="form-group">
              <label>First name</label>
              <input type="text" id="modal-first" class="form-control" placeholder="First" />
            </div>
            <div class="form-group">
              <label>Last name</label>
              <input type="text" id="modal-last" class="form-control" placeholder="Last" />
            </div>
          </div>
          <div class="form-group">
            <label>Email <span class="required">*</span></label>
            <input
              type="email"
              id="modal-email"
              class="form-control"
              placeholder="user@example.com"
              required
            />
          </div>
          <div class="admin-modal-actions">
            <button type="submit" class="btn btn-primary admin-modal-action">Save</button>
            <button type="button" class="btn btn-ghost admin-modal-action" id="cancel-user-btn">
              Cancel
            </button>
          </div>
        </form>
        <div id="modal-delete-zone" class="admin-danger-zone" hidden>
          <p class="text-muted admin-danger-copy">
            Danger zone — this action cannot be undone.
          </p>
          <button class="btn btn-danger" id="delete-user-btn">Delete this user</button>
        </div>
      </div>
    </div>

    <!-- User detail panel -->
    <div id="user-detail-modal" class="modal-backdrop" hidden>
      <div class="modal-card admin-detail-modal-card">
        <div class="modal-header">
          <h2 id="detail-title">User Details</h2>
          <button class="modal-close" id="detail-modal-close-btn">&times;</button>
        </div>
        <div id="detail-body"></div>
      </div>
    </div>

    <footer class="footer" data-shared-footer data-footer-variant="admin"></footer>

    <script src="/static/layout.js"></script>
    <script src="/static/common.js"></script>
    <script src="/static/admin.js" defer></script>
  </body>
</html>
