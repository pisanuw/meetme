<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Feedback – MeetMe</title>
    <link rel="stylesheet" href="/static/style.css" />
  </head>
  <body>
    <nav class="navbar">
      <div class="nav-inner">
        <a href="/dashboard.html" class="nav-brand">
          <span class="brand-icon">&#x27F3;</span> MeetMe
        </a>
        <div class="nav-links" id="nav-auth" hidden>
          <span class="nav-user" id="nav-username"></span>
          <a href="#" class="nav-link" id="logout-link">Log out</a>
        </div>
      </div>
    </nav>

    <div id="flash-container" class="flash-container"></div>

    <main class="main-content">
      <div class="auth-wrapper">
        <div class="auth-card">
          <div class="auth-header feedback-header">
            <h1 class="feedback-title">Send Feedback</h1>
            <p class="feedback-copy">
              Bug report, feature request, or general question? We'd love to hear from you. Your
              message will be sent directly to the team.
            </p>
          </div>

          <form id="feedback-form" class="auth-form">
            <div class="form-row">
              <div class="form-group">
                <label for="fb-name">Your name</label>
                <input type="text" id="fb-name" class="form-control" placeholder="Jane Smith" />
              </div>
              <div class="form-group">
                <label for="fb-email">Email address <span class="required">*</span></label>
                <input
                  type="email"
                  id="fb-email"
                  class="form-control"
                  placeholder="you@example.com"
                  required
                />
              </div>
            </div>

            <div class="form-group">
              <label for="fb-type">Type of feedback</label>
              <select id="fb-type" class="form-control">
                <option value="bug">&#x1F41B; Bug report</option>
                <option value="feature">&#x1F4A1; Feature request</option>
                <option value="question">&#x2753; Question</option>
                <option value="other">&#x1F4AC; General feedback</option>
              </select>
            </div>

            <div class="form-group">
              <label for="fb-message">Message <span class="required">*</span></label>
              <textarea
                id="fb-message"
                class="form-control"
                rows="6"
                placeholder="Describe your feedback in as much detail as possible..."
                required
              ></textarea>
            </div>

            <button type="submit" class="btn btn-primary btn-full" id="fb-submit">
              &#x2709; Send Feedback
            </button>
          </form>

          <div id="feedback-sent" class="feedback-sent" hidden>
            <div class="feedback-sent-icon">&#x2705;</div>
            <h2 class="feedback-sent-title">Feedback sent!</h2>
            <p class="feedback-sent-copy">
              Thank you — the team will review your message shortly.
            </p>
            <a href="/dashboard.html" class="btn btn-ghost feedback-sent-link"
              >Back to dashboard</a
            >
          </div>
        </div>
      </div>
    </main>

    <footer class="footer" data-shared-footer></footer>

    <script src="/static/layout.js"></script>
    <script src="/static/common.js"></script>
    <script src="/static/feedback.js" defer></script>
  </body>
</html>
