<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Book Time – MeetMe</title>
    <link rel="stylesheet" href="/static/style.css" />
  </head>
  <body>
    <nav class="navbar">
      <div class="nav-inner">
        <a href="/dashboard.html" class="nav-brand"><span class="brand-icon">&#x27F3;</span> MeetMe</a>
        <div class="nav-links" id="nav-auth" hidden>
          <a href="/create-meeting.html" class="btn btn-sm btn-outline-white">+ New Meeting</a>
          <span class="nav-user" id="nav-username"></span>
          <a href="#" class="nav-link" id="logout-link">Log out</a>
        </div>
      </div>
    </nav>

    <div id="flash-container" class="flash-container"></div>

    <main class="main-content">
      <div class="form-page">
        <div class="form-card">
          <h1 id="book-title">Book Time</h1>
          <p class="text-muted" id="book-host">Loading booking page...</p>

          <div class="form-group">
            <label for="event-select">Event type</label>
            <select id="event-select" class="form-control"></select>
          </div>

          <input id="book-date" type="hidden" />

          <div class="form-group">
            <div class="week-nav">
              <button type="button" id="prev-week-btn" class="btn btn-ghost btn-sm">&lsaquo; Prev</button>
              <span id="week-label" class="week-nav-label"></span>
              <button type="button" id="next-week-btn" class="btn btn-ghost btn-sm">Next &rsaquo;</button>
            </div>
          </div>

          <div class="form-group">
            <div id="slots-grid"></div>
          </div>

          <div class="form-actions">
            <a class="btn btn-ghost" href="/dashboard.html">Back</a>
            <button id="book-btn" class="btn btn-primary" disabled>Book Selected Slot</button>
          </div>
        </div>
      </div>
    </main>

    <footer class="footer" data-shared-footer></footer>

    <script src="/static/layout.js"></script>
    <script src="/static/common.js"></script>
    <script src="/static/book.js" defer></script>
  </body>
</html>
