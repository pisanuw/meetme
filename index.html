<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Log In – MeetSync</title>
  <link rel="stylesheet" href="/static/style.css"/>
</head>
<body>

<nav class="navbar">
  <div class="nav-inner">
    <a href="/dashboard.html" class="nav-brand">
      <span class="brand-icon">&#x27F3;</span> MeetSync
    </a>
    <div class="nav-links" id="nav-auth" style="display:none;">
      <a href="/create-meeting.html" class="btn btn-sm btn-outline-white">+ New Meeting</a>
      <span class="nav-user" id="nav-username"></span>
      <a href="#" class="nav-link" id="logout-link">Log out</a>
    </div>
  </div>
</nav>

<div id="flash-container" class="flash-container"></div>

<main class="main-content">
  <div class="auth-wrapper">
    <div class="auth-card">
      <div class="auth-header">
        <div class="auth-logo">&#x27F3;</div>
        <h1>Welcome back</h1>
        <p>Sign in to MeetSync without a password</p>
      </div>

      <form id="magic-link-form" class="auth-form">
        <div class="form-group">
          <label for="email">Email address</label>
          <input type="email" id="email" name="email" class="form-control"
                 placeholder="you@example.com" required autofocus/>
        </div>
        <button type="submit" class="btn btn-primary btn-full">Email me a sign-in link</button>
      </form>

      <div class="auth-divider"><span>or</span></div>

      <a href="/api/auth/google/start" class="btn btn-ghost btn-full">Continue with Google</a>

      <p class="auth-footer">
        New here?
        <a href="/register.html">Set your name and get a sign-in link</a>
      </p>
    </div>
  </div>
</main>

<footer class="footer">
  <p>MeetSync &ndash; Find the perfect time together</p>
</footer>

<script src="/static/common.js"></script>
<script>
  // Redirect if already logged in
  checkAuth().then(user => {
    if (user) window.location.href = '/dashboard.html';

    const params = new URLSearchParams(window.location.search);
    const error = params.get('error');
    const errorMap = {
      'invalid-link': 'That sign-in link is invalid or already used. Please request a new one.',
      'google-not-configured': 'Google sign-in is not configured yet.',
      'google-auth-failed': 'Google sign-in failed. Please try again.',
      'google-email-not-verified': 'Your Google account email must be verified.',
    };
    if (error && errorMap[error]) {
      showFlash(errorMap[error], 'danger');
      window.history.replaceState({}, document.title, '/');
    }
  });

  document.getElementById('magic-link-form').addEventListener('submit', async (e) => {
    e.preventDefault();
    const email = document.getElementById('email').value.trim();

    try {
      const res = await fetch('/api/auth/magic-link/request', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ email }),
      });
      const data = await res.json();
      if (res.ok) {
        showFlash(data.message || 'Check your email for a sign-in link.', 'success');
      } else {
        showFlash(data.error || 'Could not send sign-in link.', 'danger');
      }
    } catch (err) {
      showFlash('Could not send sign-in link. Please try again.', 'danger');
    }
  });
</script>
</body>
</html>
