<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>New Booking – MeetMe</title>
    <link rel="stylesheet" href="/static/style.css" />
  </head>
  <body>
    <nav class="navbar" data-shared-nav></nav>

    <div id="flash-container" class="flash-container"></div>

    <main class="main-content">
      <div class="form-page">
        <div class="form-card">
          <p class="text-muted"><a href="/dashboard.html">&#x2190; Dashboard</a></p>
          <h1 id="page-heading">New Booking</h1>

          <section id="event-type-panel" class="form-group">
            <form id="event-type-form">
              <input type="hidden" id="event-type-id" />
              <div class="form-group">
                <label for="event-title">Title <span class="required">*</span></label>
                <input id="event-title" class="form-control" required maxlength="120" placeholder="e.g. Intro Call" />
              </div>
              <div class="form-group">
                <label for="event-description">Description</label>
                <textarea id="event-description" class="form-control" rows="2" maxlength="1200"></textarea>
              </div>
              <div class="form-row">
                <div class="form-group">
                  <label for="event-kind">Type</label>
                  <select id="event-kind" class="form-control">
                    <option value="one_on_one">One-on-one</option>
                    <option value="group">Group</option>
                  </select>
                </div>
                <div class="form-group">
                  <label for="event-duration">Duration (minutes)</label>
                  <select id="event-duration" class="form-control">
                    <option value="15">15</option>
                    <option value="30" selected>30</option>
                    <option value="45">45</option>
                    <option value="60">60</option>
                    <option value="90">90</option>
                  </select>
                </div>
              </div>
              <div class="form-row">
                <div class="form-group">
                  <label for="event-day-start">Available from</label>
                  <select id="event-day-start" class="form-control"></select>
                </div>
                <div class="form-group">
                  <label for="event-day-end">Available until</label>
                  <select id="event-day-end" class="form-control"></select>
                </div>
              </div>
              <div class="form-row">
                <div class="form-group">
                  <label for="event-capacity">Group capacity</label>
                  <input id="event-capacity" type="number" min="1" max="100" value="1" class="form-control" />
                </div>
                <div class="form-group">
                  <label for="event-timezone">Timezone</label>
                  <input id="event-timezone" class="form-control" value="UTC" />
                </div>
              </div>
              <div class="form-actions">
                <a href="/dashboard.html" class="btn btn-ghost">Cancel</a>
                <button type="submit" class="btn btn-primary">Save Booking Type</button>
              </div>
            </form>
          </section>
        </div>
      </div>
    </main>

    <footer class="footer" data-shared-footer></footer>

    <script src="/static/layout.js"></script>
    <script src="/static/common.js"></script>
    <script src="/static/booking-setup.js" defer></script>
  </body>
</html>
