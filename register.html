<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Get Sign-in Link – MeetMe</title>
    <link rel="stylesheet" href="/static/style.css" />
  </head>
  <body>
    <nav class="navbar">
      <div class="nav-inner">
        <a href="/dashboard.html" class="nav-brand">
          <span class="brand-icon">&#x27F3;</span> MeetMe
        </a>
      </div>
    </nav>

    <div id="flash-container" class="flash-container"></div>

    <main class="main-content">
      <div class="auth-wrapper">
        <div class="auth-card">
          <div class="auth-header">
            <div class="auth-logo">&#x27F3;</div>
            <h1>Set up your sign-in</h1>
            <p>No password needed — we’ll send a secure link to your email.</p>
          </div>

          <form id="magic-link-form" class="auth-form">
            <div class="form-group">
              <label for="name">Full name</label>
              <input
                type="text"
                id="name"
                name="name"
                class="form-control"
                placeholder="Jane Smith"
                autofocus
              />
            </div>
            <div class="form-group">
              <label for="email">Email address</label>
              <input
                type="email"
                id="email"
                name="email"
                class="form-control"
                placeholder="you@example.com"
                required
              />
            </div>
            <button type="submit" class="btn btn-primary btn-full">Email me a sign-in link</button>
          </form>

          <div class="auth-divider"><span>or</span></div>

          <a href="/api/auth/google/start" class="btn btn-ghost btn-full">Continue with Google</a>

          <p class="auth-footer">
            Back to sign in:
            <a href="/">Sign in</a>
          </p>
        </div>
      </div>
    </main>

    <footer class="footer" data-shared-footer></footer>

    <script src="/static/layout.js"></script>
    <script src="/static/common.js"></script>
    <script src="/static/register.js" defer></script>
  </body>
</html>
