<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Create Account – MeetSync</title>
  <link rel="stylesheet" href="/static/style.css"/>
</head>
<body>

<nav class="navbar">
  <div class="nav-inner">
    <a href="/dashboard.html" class="nav-brand">
      <span class="brand-icon">&#x27F3;</span> MeetSync
    </a>
  </div>
</nav>

<div id="flash-container" class="flash-container"></div>

<main class="main-content">
  <div class="auth-wrapper">
    <div class="auth-card">
      <div class="auth-header">
        <div class="auth-logo">&#x27F3;</div>
        <h1>Create account</h1>
        <p>Join MeetSync to schedule smarter</p>
      </div>

      <form id="register-form" class="auth-form">
        <div class="form-group">
          <label for="name">Full name</label>
          <input type="text" id="name" name="name" class="form-control"
                 placeholder="Jane Smith" required autofocus/>
        </div>
        <div class="form-group">
          <label for="email">Email address</label>
          <input type="email" id="email" name="email" class="form-control"
                 placeholder="you@example.com" required/>
        </div>
        <div class="form-group">
          <label for="password">Password</label>
          <input type="password" id="password" name="password" class="form-control"
                 placeholder="At least 6 characters" required/>
        </div>
        <div class="form-group">
          <label for="confirm_password">Confirm password</label>
          <input type="password" id="confirm_password" name="confirm_password" class="form-control"
                 placeholder="Repeat password" required/>
        </div>
        <button type="submit" class="btn btn-primary btn-full">Create Account</button>
      </form>

      <p class="auth-footer">
        Already have an account?
        <a href="/">Sign in</a>
      </p>
    </div>
  </div>
</main>

<footer class="footer">
  <p>MeetSync &ndash; Find the perfect time together</p>
</footer>

<script src="/static/common.js"></script>
<script>
  checkAuth().then(user => {
    if (user) window.location.href = '/dashboard.html';
  });

  document.getElementById('register-form').addEventListener('submit', async (e) => {
    e.preventDefault();
    const name = document.getElementById('name').value;
    const email = document.getElementById('email').value;
    const password = document.getElementById('password').value;
    const confirm_password = document.getElementById('confirm_password').value;

    try {
      const res = await fetch('/api/auth/register', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ name, email, password, confirm_password }),
      });
      const data = await res.json();
      if (res.ok && data.success) {
        window.location.href = '/dashboard.html';
      } else {
        showFlash(data.error || 'Registration failed.', 'danger');
      }
    } catch (err) {
      showFlash('Registration failed. Please try again.', 'danger');
    }
  });
</script>
</body>
</html>
