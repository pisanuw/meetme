<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Get Sign-in Link – MeetMe</title>
  <link rel="stylesheet" href="/static/style.css"/>
</head>
<body>

<nav class="navbar">
  <div class="nav-inner">
    <a href="/dashboard.html" class="nav-brand">
      <span class="brand-icon">&#x27F3;</span> MeetMe
    </a>
  </div>
</nav>

<div id="flash-container" class="flash-container"></div>

<main class="main-content">
  <div class="auth-wrapper">
    <div class="auth-card">
      <div class="auth-header">
        <div class="auth-logo">&#x27F3;</div>
        <h1>Set up your sign-in</h1>
        <p>No password needed — we’ll send a secure link to your email.</p>
      </div>

      <form id="magic-link-form" class="auth-form">
        <div class="form-group">
          <label for="name">Full name</label>
          <input type="text" id="name" name="name" class="form-control"
                 placeholder="Jane Smith" autofocus/>
        </div>
        <div class="form-group">
          <label for="email">Email address</label>
          <input type="email" id="email" name="email" class="form-control"
                 placeholder="you@example.com" required/>
        </div>
        <button type="submit" class="btn btn-primary btn-full">Email me a sign-in link</button>
      </form>

      <div class="auth-divider"><span>or</span></div>

      <a href="/api/auth/google/start" class="btn btn-ghost btn-full">Continue with Google</a>

      <p class="auth-footer">
        Back to sign in:
        <a href="/">Sign in</a>
      </p>
    </div>
  </div>
</main>

<footer class="footer">
  <p>MeetMe &ndash; Find the perfect time together &mdash; <a href="/feedback.html" style="color:inherit;">Send feedback</a></p>
</footer>

<script src="/static/common.js"></script>
<script>
  checkAuth().then(user => {
    if (user) window.location.href = '/dashboard.html';
  });

  document.getElementById('magic-link-form').addEventListener('submit', async (e) => {
    e.preventDefault();
    const name = document.getElementById('name').value.trim();
    const email = document.getElementById('email').value.trim();

    const { ok, data } = await apiFetch('/api/auth/magic-link/request', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ name, email }),
    });
    if (ok) {
      window.location.href = '/email-sent.html?email=' + encodeURIComponent(email);
    } else {
      showFlash(data.error || 'Could not send sign-in link. Please try again.', 'danger');
    }
  });
</script>
</body>
</html>
