<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>My Bookings – MeetMe</title>
    <link rel="stylesheet" href="/static/style.css" />
  </head>
  <body>
    <nav class="navbar">
      <div class="nav-inner">
        <a href="/dashboard.html" class="nav-brand"><span class="brand-icon">&#x27F3;</span> MeetMe</a>
        <div class="nav-links" id="nav-auth" style="display: none">
          <a href="/create-meeting.html" class="btn btn-sm btn-outline-white">+ New Meeting</a>
          <span class="nav-user" id="nav-username"></span>
          <a href="#" class="nav-link" id="logout-link">Log out</a>
        </div>
      </div>
    </nav>

    <div id="flash-container" class="flash-container"></div>

    <main class="main-content">
      <h1>My Bookings</h1>
      <p class="text-muted" style="margin: 8px 0 18px;">Bookings where you are host or attendee.</p>

      <div class="grid-toolbar" style="margin-bottom: 16px;">
        <div class="view-tabs">
          <button id="tab-host" class="view-tab active" type="button">As Host</button>
          <button id="tab-mine" class="view-tab" type="button">As Attendee</button>
        </div>
        <div style="display: flex; align-items: center; gap: 8px;">
          <label id="reminder-window-label" for="reminder-window" class="text-muted" style="margin: 0;">Remind upcoming within</label>
          <select id="reminder-window" class="form-control" style="width: 120px;">
            <option value="2">2h</option>
            <option value="6">6h</option>
            <option value="24" selected>24h</option>
            <option value="48">48h</option>
          </select>
          <button id="send-reminders-btn" class="btn btn-primary" type="button">Send Reminders</button>
        </div>
      </div>

      <div id="bookings-grid" class="meeting-grid"></div>
    </main>

    <footer class="footer" data-shared-footer></footer>

    <script src="/static/layout.js"></script>
    <script src="/static/common.js"></script>
    <script src="/static/bookings.js" defer></script>
  </body>
</html>
