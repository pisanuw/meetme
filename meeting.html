<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Meeting – MeetMe</title>
  <link rel="stylesheet" href="/static/style.css"/>
</head>
<body>

<nav class="navbar">
  <div class="nav-inner">
    <a href="/dashboard.html" class="nav-brand">
      <span class="brand-icon">&#x27F3;</span> MeetMe
    </a>
    <div class="nav-links" id="nav-auth" style="display:none;">
      <a href="/create-meeting.html" class="btn btn-sm btn-outline-white">+ New Meeting</a>
      <span class="nav-user" id="nav-username"></span>
      <a href="#" class="nav-link" id="logout-link">Log out</a>
    </div>
  </div>
</nav>

<div id="flash-container" class="flash-container"></div>

<main class="main-content">
  <div class="meeting-page" id="meeting-page" style="display:none;">

    <!-- HEADER -->
    <div class="meeting-header">
      <div>
        <div class="breadcrumb"><a href="/dashboard.html">Dashboard</a> &rsaquo; Meeting</div>
        <h1 id="meeting-title"></h1>
        <p class="text-muted" id="meeting-desc"></p>
        <div class="meeting-meta-row">
          <span class="badge badge-blue" id="meeting-type-badge"></span>
          <span class="text-muted" id="meeting-time-range"></span>
          <span class="text-muted" id="meeting-respond-count"></span>
          <span class="badge badge-green" id="finalized-badge" style="display:none;">&#x2713; Finalized</span>
        </div>
        <div id="tz-bar" style="display:none;margin-top:6px;font-size:0.8rem;color:var(--text-muted);display:flex;gap:8px;align-items:center;flex-wrap:wrap;">
          <span>&#x1F5FA; Time zone:</span>
          <span id="tz-label" style="font-weight:600;"></span>
          <button id="tz-toggle-btn" class="btn btn-xs btn-ghost" style="padding:2px 8px;font-size:0.75rem;"
                  onclick="toggleTzView()"></button>
        </div>
      </div>

      <div class="finalized-banner" id="finalized-banner" style="display:none;">
        <div class="finalized-time" id="finalized-time"></div>
        <div class="finalized-note" id="finalized-note"></div>
        <div style="display:flex; gap:8px; flex-wrap:wrap;">
          <button class="btn btn-ghost" id="btn-unfinalize" style="display:none;">Edit finalization</button>
        </div>
      </div>

      <div id="share-controls" style="display:none; margin-top:10px;">
        <a id="share-email-link" class="btn btn-sm btn-ghost" href="#">Share privately by email</a>
        <button id="remind-pending-btn" class="btn btn-sm btn-ghost" onclick="sendPendingReminders()" type="button">Send reminder to non-responders</button>
      </div>
    </div>

    <!-- TOOLBAR -->
    <div class="grid-toolbar">
      <div class="view-tabs" id="view-tabs"></div>
      <div id="gcal-area" style="display:none;">
        <button class="btn btn-sm btn-ghost" id="gcal-btn" onclick="loadBusyTimes()" style="gap:6px;display:flex;align-items:center;">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" style="flex-shrink:0">
            <path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"/>
            <path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/>
            <path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l3.66-2.84z" fill="#FBBC05"/>
            <path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"/>
          </svg>
          Load busy times
        </button>
      </div>
      <div id="person-selector" style="display:none;">
        <select class="form-control" id="person-select" onchange="filterPerson(this.value)"></select>
      </div>
      <div class="legend">
        <span class="legend-label">Fewer</span>
        <span class="legend-swatch" style="background:#edfaed"></span>
        <span class="legend-swatch" style="background:#a5d6a7"></span>
        <span class="legend-swatch" style="background:#4caf50"></span>
        <span class="legend-swatch" style="background:#1b5e20"></span>
        <span class="legend-label">More</span>
      </div>
    </div>

    <div id="edit-instructions" class="instructions" style="display:none;">
      Click or click-and-drag to select your available times. Changes save automatically.
    </div>
    <div id="heatmap-instructions" class="instructions"></div>

    <!-- GRID -->
    <div class="grid-scroll-wrapper">
      <div class="av-grid" id="av-grid" data-editing="false"></div>
    </div>

    <!-- FINALIZE PANEL -->
    <div class="finalize-panel" id="finalize-panel" style="display:none;">
      <h3>&#x1F4CC; Finalize meeting time</h3>
      <p class="text-muted">You've selected: <strong id="finalize-slot-label">&ndash;</strong></p>
      <div class="form-row">
        <div class="form-group">
          <label>Duration</label>
          <select class="form-control" id="finalize-duration">
            <option value="30">30 minutes</option>
            <option value="60" selected>1 hour</option>
            <option value="90">1.5 hours</option>
            <option value="120">2 hours</option>
            <option value="180">3 hours</option>
            <option value="240">4 hours</option>
          </select>
        </div>
      </div>
      <div class="form-group">
        <label>Note to participants</label>
        <textarea class="form-control" id="finalize-note" rows="3"
                  placeholder="Location, dial-in link, agenda..."></textarea>
      </div>
      <div style="display:flex; gap:12px; margin-top:16px;">
        <button class="btn btn-primary" onclick="confirmFinalize()">&#x2713; Confirm &amp; Finalize</button>
        <button class="btn btn-ghost" onclick="cancelFinalize()">Cancel</button>
      </div>
    </div>

    <!-- PARTICIPANTS -->
    <div class="participants-panel" id="participants-panel" style="display:none;">
      <h3>Participants <span class="text-muted" id="participant-count"></span></h3>
      <div class="participants-list" id="participants-list"></div>
    </div>

  </div>
</main>

<footer class="footer">
  <p>MeetMe &ndash; Find the perfect time together</p>
</footer>

<script src="/static/common.js"></script>
<script>
// Meeting data - loaded from API
let M = null;
let currentView = 'heatmap';
let currentPerson = 0;
let isDragging = false;
let dragAction = null;
let saveTimer = null;
let pendingFinalize = null;
let meetingTz = 'UTC';
let viewerTz   = Intl.DateTimeFormat().resolvedOptions().timeZone || 'UTC';
let showMeetingTz = false;   // false = viewer TZ, true = meeting TZ
let busySlots = new Set();   // slot keys from Google Calendar

(async () => {
  const user = await requireAuth();
  if (!user) return;

  const params = new URLSearchParams(window.location.search);
  const meetingId = params.get('id');
  if (!meetingId) { window.location.href = '/dashboard.html'; return; }

  const { ok, status, data } = await apiFetch(`/api/meetings/${meetingId}`);
  if (!ok) {
    showFlash(data.error || `Could not load meeting (HTTP ${status}).`, 'danger');
    setTimeout(() => window.location.href = '/dashboard.html', 2000);
    return;
  }

  M = {
    id: data.meeting.id,
    dates: data.meeting.dates_or_days,
    timeSlots: data.time_slots,
    mySlots: new Set(data.my_slots),
    slotCounts: data.slot_counts,
    totalInvited: data.total_invited,
    isCreator: data.is_creator,
    isFinalized: data.meeting.is_finalized,
    finalizedDate: data.meeting.finalized_date,
    finalizedSlot: data.meeting.finalized_slot,
    meetingType: data.meeting.meeting_type,
    participants: data.participants || [],
    meeting: data.meeting,
  };

  meetingTz = data.meeting.timezone || 'UTC';

  // Load viewer timezone from profile
  const { ok: pOk, data: pData } = await apiFetch('/api/auth/profile');
  if (pOk && pData.timezone) viewerTz = pData.timezone;

  // Show timezone bar if they differ and it's a specific-date meeting
  if (meetingTz && M.meetingType === 'specific_dates') {
    const bar = document.getElementById('tz-bar');
    const lbl = document.getElementById('tz-label');
    const btn = document.getElementById('tz-toggle-btn');
    bar.style.display = 'flex';
    lbl.textContent = viewerTz;
    btn.textContent = meetingTz !== viewerTz ? `Switch to meeting TZ (${meetingTz})` : '';
    btn.style.display = meetingTz !== viewerTz ? '' : 'none';
  }

  // Show Google Calendar button if connected and specific dates
  if (pOk && pData.calendar_connected && M.meetingType === 'specific_dates') {
    document.getElementById('gcal-area').style.display = '';
  }

  document.getElementById('meeting-page').style.display = '';
  document.title = `${M.meeting.title} – MeetMe`;

  // Header
  document.getElementById('meeting-title').textContent = M.meeting.title;
  if (M.meeting.description) {
    document.getElementById('meeting-desc').textContent = M.meeting.description;
  }
  document.getElementById('meeting-type-badge').textContent =
    (M.meeting.meeting_type || '').replace('_', ' ').replace(/\b\w/g, c => c.toUpperCase());
  document.getElementById('meeting-time-range').textContent = `${M.meeting.start_time} – ${M.meeting.end_time}`;
  document.getElementById('meeting-respond-count').textContent = `${data.respond_count}/${data.invite_count} responded`;

  document.getElementById('heatmap-instructions').textContent =
    `Showing combined availability for all ${data.invite_count} participant${data.invite_count !== 1 ? 's' : ''}.`;

  // Finalized state
  if (M.isFinalized) {
    document.getElementById('finalized-badge').style.display = '';
    const banner = document.getElementById('finalized-banner');
    banner.style.display = '';
    document.getElementById('finalized-time').innerHTML =
      `&#x1F4C5; ${escapeHtml(M.finalizedDate)} at ${fmtTime(M.finalizedSlot, M.finalizedDate)} (${M.meeting.duration_minutes} min)`;
    if (meetingTz && meetingTz !== 'UTC') {
      document.getElementById('finalized-time').innerHTML +=
        ` <span style="font-size:0.75rem;color:var(--text-muted);">(${meetingTz})</span>`;
    }
    if (M.meeting.note) {
      document.getElementById('finalized-note').textContent = M.meeting.note;
    }
    if (M.isCreator) {
      document.getElementById('btn-unfinalize').style.display = '';
    }
  }

  // View tabs
  const tabsContainer = document.getElementById('view-tabs');
  tabsContainer.innerHTML = `
    <button class="view-tab active" data-view="heatmap" onclick="setView('heatmap',this)">&#x1F321; Group availability</button>
    ${!M.isFinalized ? '<button class="view-tab" data-view="mine" onclick="setView(\'mine\',this)">&#x270F; My availability</button>' : ''}
    ${M.isCreator && M.participants.length ? '<button class="view-tab" data-view="person" onclick="setView(\'person\',this)">&#x1F464; By person</button>' : ''}
  `;

  // Person selector
  if (M.isCreator && M.participants.length) {
    const sel = document.getElementById('person-select');
    M.participants.forEach((p, i) => {
      sel.innerHTML += `<option value="${i}">${escapeHtml(p.name)} (${p.slot_count} slot${p.slot_count !== 1 ? 's' : ''})${!p.responded ? ' – no response' : ''}</option>`;
    });
  }

  // Participants panel
  if (M.isCreator) {
    document.getElementById('participants-panel').style.display = '';
    document.getElementById('participant-count').textContent = `(${data.invite_count})`;
    const list = document.getElementById('participants-list');
    M.participants.forEach((p, i) => {
      list.innerHTML += `
        <div class="participant-row" onclick="jumpToParticipant(${i})">
          <div class="participant-avatar">${escapeHtml((p.name || '?')[0].toUpperCase())}</div>
          <div class="participant-info">
            <div class="participant-name">${escapeHtml(p.name)}</div>
            <div class="participant-email text-muted">${escapeHtml(p.email)}</div>
          </div>
          <div class="participant-slots">
            ${p.responded
              ? `<span class="badge badge-green">${p.slot_count} slots</span>`
              : '<span class="badge badge-gray">No response</span>'}
          </div>
        </div>`;
    });

    // Share control for creator
    const shareWrap = document.getElementById('share-controls');
    const shareLink = document.getElementById('share-email-link');
    const meetingUrl = `${window.location.origin}/meeting.html?id=${encodeURIComponent(M.id)}`;
    const subject = encodeURIComponent(`MeetMe: ${M.meeting.title}`);
    const body = encodeURIComponent(
      `Hi,\n\nPlease share your availability for this meeting:\n${meetingUrl}\n\n` +
      `This is a private link.\n\nThanks!`
    );
    shareLink.href = `mailto:?subject=${subject}&body=${body}`;
    shareWrap.style.display = '';
  }

  // Unfinalize button
  const btnUnfinalize = document.getElementById('btn-unfinalize');
  if (btnUnfinalize) {
    btnUnfinalize.addEventListener('click', async () => {
      if (!confirm('Remove finalization and reopen for editing?')) return;
      const { ok, data: d } = await apiFetch(`/api/meeting/${M.id}/unfinalize`, { method: 'POST' });
      if (ok && d.success) window.location.reload();
      else showFlash(d.error || 'Failed to unfinalize. Please try again.', 'danger');
    });
  }

  buildGrid();

  // Default to edit mode if no slots selected
  if (!M.isFinalized && M.mySlots.size === 0) {
    const mineTab = document.querySelector('[data-view="mine"]');
    if (mineTab) setView('mine', mineTab);
  }
})();

// --- Grid rendering (same logic as original app.js) ---

function heatColor(count) {
  if (!count || count === 0) return '#f5f5f5';
  const ratio = Math.min(count / Math.max(M.totalInvited, 1), 1);
  if (ratio <= 0) return '#f5f5f5';
  if (ratio <= 0.20) return '#e8f5e9';
  if (ratio <= 0.40) return '#c8e6c9';
  if (ratio <= 0.65) return '#81c784';
  if (ratio <= 0.85) return '#4caf50';
  return '#2e7d32';
}

function slotKey(date, time) { return `${date}_${time}`; }

function fmtDate(d) {
  if (!d.includes('-')) return d;
  const [y, mo, day] = d.split('-').map(Number);
  const dt = new Date(y, mo - 1, day);
  return dt.toLocaleDateString('en-US', { weekday: 'short', month: 'short', day: 'numeric' });
}

function fmtTime(t, date) {
  // If viewer TZ differs from meeting TZ and we have a date, convert
  const displayTz = showMeetingTz ? meetingTz : viewerTz;
  if (date && date.includes('-') && meetingTz && displayTz !== meetingTz) {
    const converted = convertSlotTime(date, t, meetingTz, displayTz);
    if (converted) t = converted;
  }
  const [h, m] = t.split(':').map(Number);
  const ampm = h >= 12 ? 'PM' : 'AM';
  const h12 = h % 12 || 12;
  return `${h12}:${String(m).padStart(2, '0')} ${ampm}`;
}

/** Convert a slot time from meetingTz to targetTz on a given date. */
function convertSlotTime(date, time, fromTz, toTz) {
  try {
    if (!date.includes('-') || fromTz === toTz) return null;
    const [y, mo, d] = date.split('-').map(Number);
    const [h, m] = time.split(':').map(Number);
    // Treat (y, mo, d, h, m) as UTC to get a reference ms value
    const utcRef = Date.UTC(y, mo - 1, d, h, m);
    const refDate = new Date(utcRef);
    // Find local representation in fromTz
    const parts = new Intl.DateTimeFormat('en-US', {
      timeZone: fromTz, year:'numeric', month:'numeric', day:'numeric',
      hour:'numeric', minute:'numeric', hour12: false,
    }).formatToParts(refDate);
    const get = t2 => parseInt(parts.find(p => p.type === t2)?.value || '0');
    const offsetMins = (get('hour') * 60 + get('minute')) - (h * 60 + m);
    // True UTC = utcRef - offset
    const trueUtc = utcRef - offsetMins * 60000;
    // Format in target TZ
    const result = new Intl.DateTimeFormat('en-US', {
      timeZone: toTz, hour: '2-digit', minute: '2-digit', hour12: false,
    }).format(new Date(trueUtc));
    return result; // e.g. "14:30"
  } catch { return null; }
}

window.toggleTzView = function() {
  showMeetingTz = !showMeetingTz;
  const lbl = document.getElementById('tz-label');
  const btn = document.getElementById('tz-toggle-btn');
  lbl.textContent = showMeetingTz ? meetingTz : viewerTz;
  btn.textContent = showMeetingTz
    ? `Switch to your TZ (${viewerTz})`
    : `Switch to meeting TZ (${meetingTz})`;
  buildGrid();
};

window.loadBusyTimes = async function() {
  const btn = document.getElementById('gcal-btn');
  btn.disabled = true;
  btn.textContent = 'Loading…';
  const { ok, data } = await apiFetch(`/api/calendar/busy?meeting_id=${M.id}`);
  if (ok && data.busy_slots) {
    busySlots = new Set(data.busy_slots);
    repaintAll();
    showFlash(`Loaded busy times (${busySlots.size} slot${busySlots.size !== 1 ? 's' : ''} marked busy). You can still override manually.`, 'info');
    btn.textContent = 'Reload busy times';
  } else {
    showFlash(
      data?.error === 'calendar_not_connected'
        ? 'Google Calendar is not connected. Go to Profile to connect it.'
        : (data?.error || 'Could not load calendar data.'),
      'danger',
    );
    btn.textContent = 'Load busy times';
  }
  btn.disabled = false;
};

window.sendPendingReminders = async function() {
  if (!M?.isCreator) return;
  const btn = document.getElementById('remind-pending-btn');
  if (!btn) return;

  if (!confirm('Send reminder emails to participants who have not responded yet?')) return;

  btn.disabled = true;
  const prev = btn.textContent;
  btn.textContent = 'Sending…';

  const { ok, data } = await apiFetch(`/api/meeting/${M.id}/remind-pending`, {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({}),
  });

  if (ok && data.success) {
    const failed = Number(data.failed_count || 0);
    const sent = Number(data.sent_count || 0);
    const msg = failed > 0
      ? `Sent ${sent} reminder${sent === 1 ? '' : 's'} (${failed} failed).`
      : (data.message || `Sent ${sent} reminder${sent === 1 ? '' : 's'}.`);
    showFlash(msg, failed > 0 ? 'warning' : 'success');
  } else {
    showFlash(data?.error || 'Could not send reminders. Please try again.', 'danger');
  }

  btn.disabled = false;
  btn.textContent = prev;
};

function mkEl(tag, cls) {
  const d = document.createElement(tag);
  if (cls) d.className = cls;
  return d;
}

function buildGrid() {
  const grid = document.getElementById('av-grid');
  grid.innerHTML = '';
  const numCols = M.dates.length;
  grid.style.setProperty('--cols', numCols);

  const corner = mkEl('div', 'ag-corner ag-col-header');
  grid.appendChild(corner);

  M.dates.forEach(d => {
    const hdr = mkEl('div', 'ag-col-header');
    if (M.isFinalized && d === M.finalizedDate) hdr.classList.add('is-finalized');
    hdr.innerHTML = `<div>${fmtDate(d)}</div>`;
    grid.appendChild(hdr);
  });

  M.timeSlots.forEach(time => {
    const [h, m] = time.split(':').map(Number);
    const isHour = m === 0;
    const lbl = mkEl('div', `ag-time-label${isHour ? ' hour-boundary' : ''}`);
    lbl.textContent = isHour ? fmtTime(time, M.dates[0]) : '';
    grid.appendChild(lbl);

    M.dates.forEach(date => {
      const key = slotKey(date, time);
      const cell = mkEl('div', `ag-cell${isHour ? ' hour-boundary' : ''}`);
      cell.dataset.date = date;
      cell.dataset.time = time;
      cell.dataset.key = key;
      paintCell(cell);
      grid.appendChild(cell);
    });
  });

  if (!M.isFinalized) attachGridEvents(grid);
  if (M.isCreator && !M.isFinalized) {
    grid.addEventListener('click', e => {
      if (currentView !== 'heatmap') return;
      const cell = e.target.closest('.ag-cell');
      if (!cell) return;
      showFinalizePanel(cell.dataset.date, cell.dataset.time);
    });
  }
}

function paintCell(cell) {
  const key = cell.dataset.key;
  const date = cell.dataset.date;
  const time = cell.dataset.time;
  const count = M.slotCounts[key] || 0;
  const isMine = M.mySlots.has(key);

  cell.style.background = '';
  cell.classList.remove('mine-selected', 'finalized-cell', 'person-highlighted');
  cell.removeAttribute('data-tip');

  if (M.isFinalized && date === M.finalizedDate && time === M.finalizedSlot) {
    cell.classList.add('finalized-cell');
  }

  if (currentView === 'mine') {
    const isBusy = busySlots.has(key);
    cell.style.background = isBusy
      ? (isMine ? '#90caf9' : '#ffcdd2')   // blue-ish if selected despite busy, red if busy
      : (isMine ? '#bbdefb' : '#f5f5f5');
    if (isMine) cell.classList.add('mine-selected');
    cell.dataset.tip = isBusy
      ? (isMine ? 'Busy on calendar (marked available anyway)' : 'Busy on your Google Calendar')
      : (isMine ? 'You are available' : 'Click to mark available');
  } else if (currentView === 'heatmap') {
    cell.style.background = heatColor(count);
    if (isMine) cell.classList.add('mine-selected');
    cell.dataset.tip = count > 0 ? `${count}/${M.totalInvited} available` : 'No one available';
  } else if (currentView === 'person') {
    const p = M.participants[currentPerson];
    const pSlots = new Set(p ? p.slots : []);
    const isp = pSlots.has(key);
    cell.style.background = isp ? '#fff3e0' : (count > 0 ? heatColor(count * 0.3) : '#f5f5f5');
    if (isp) cell.classList.add('person-highlighted');
    cell.dataset.tip = isp ? `${p.name} is available` : '';
  }
}

function repaintAll() {
  document.querySelectorAll('.ag-cell').forEach(paintCell);
}

function attachGridEvents(grid) {
  function startDrag(cell) {
    if (currentView !== 'mine') return;
    if (!cell || !cell.classList.contains('ag-cell')) return;
    isDragging = true;
    dragAction = M.mySlots.has(cell.dataset.key) ? 'remove' : 'add';
    applyDrag(cell);
  }
  function applyDrag(cell) {
    if (!cell || !cell.classList.contains('ag-cell')) return;
    const key = cell.dataset.key;
    if (dragAction === 'add') M.mySlots.add(key);
    if (dragAction === 'remove') M.mySlots.delete(key);
    paintCell(cell);
  }
  function endDrag() {
    if (isDragging) { isDragging = false; scheduleSave(); }
  }

  grid.addEventListener('mousedown', e => {
    const cell = e.target.closest('.ag-cell');
    if (cell) { startDrag(cell); e.preventDefault(); }
  });
  document.addEventListener('mousemove', e => {
    if (!isDragging) return;
    const cell = document.elementFromPoint(e.clientX, e.clientY)?.closest?.('.ag-cell');
    if (cell) applyDrag(cell);
  });
  document.addEventListener('mouseup', endDrag);
  grid.addEventListener('touchstart', e => {
    const touch = e.touches[0];
    const cell = document.elementFromPoint(touch.clientX, touch.clientY)?.closest?.('.ag-cell');
    if (cell) startDrag(cell);
  }, { passive: true });
  grid.addEventListener('touchmove', e => {
    if (!isDragging) return;
    const touch = e.touches[0];
    const cell = document.elementFromPoint(touch.clientX, touch.clientY)?.closest?.('.ag-cell');
    if (cell) applyDrag(cell);
  }, { passive: true });
  grid.addEventListener('touchend', endDrag);
}

function scheduleSave() {
  clearTimeout(saveTimer);
  saveTimer = setTimeout(saveAvailability, 500);
}

async function saveAvailability() {
  const slots = Array.from(M.mySlots);
  const { ok, data } = await apiFetch(`/api/meeting/${M.id}/availability`, {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ slots }),
  });
  if (ok && data.success) {
    M.slotCounts = data.slot_counts;
    showSavedIndicator();
  } else if (!ok) {
    showFlash(data.error || 'Failed to save availability. Please try again.', 'danger');
  }
}

function showSavedIndicator() {
  let ind = document.getElementById('save-indicator');
  if (!ind) {
    ind = document.createElement('div');
    ind.id = 'save-indicator';
    ind.style.cssText = 'position:fixed;bottom:24px;right:24px;background:#2e7d32;color:white;padding:10px 18px;border-radius:8px;font-size:0.85rem;font-weight:600;box-shadow:0 4px 16px rgba(0,0,0,0.2);z-index:999;transition:opacity 0.3s;';
    document.body.appendChild(ind);
  }
  ind.textContent = '\u2713 Saved';
  ind.style.opacity = '1';
  clearTimeout(ind._timer);
  ind._timer = setTimeout(() => { ind.style.opacity = '0'; }, 2000);
}

// View modes
window.setView = function(view, btn) {
  currentView = view;
  document.querySelectorAll('.view-tab').forEach(t => t.classList.remove('active'));
  btn.classList.add('active');
  const editMode = view === 'mine';
  document.getElementById('av-grid').dataset.editing = editMode;
  const editInst = document.getElementById('edit-instructions');
  const heatInst = document.getElementById('heatmap-instructions');
  if (editInst) editInst.style.display = editMode ? '' : 'none';
  if (heatInst) heatInst.style.display = editMode ? 'none' : '';
  const ps = document.getElementById('person-selector');
  if (ps) ps.style.display = view === 'person' ? '' : 'none';
  repaintAll();
};

window.filterPerson = function(idx) {
  currentPerson = parseInt(idx);
  repaintAll();
};

window.jumpToParticipant = function(idx) {
  currentPerson = idx;
  const tab = document.querySelector('[data-view="person"]');
  if (tab) setView('person', tab);
  const sel = document.getElementById('person-select');
  if (sel) sel.value = idx;
};

// Finalize
window.showFinalizePanel = function(date, time) {
  if (!M.isCreator || M.isFinalized) return;
  pendingFinalize = { date, time };
  const panel = document.getElementById('finalize-panel');
  if (!panel) return;
  panel.style.display = '';
  const lbl = document.getElementById('finalize-slot-label');
  if (lbl) lbl.textContent = `${fmtDate(date)} at ${fmtTime(time, date)}`;
  if (meetingTz && meetingTz !== viewerTz && meetingTz !== 'UTC') {
    lbl.title = `In meeting timezone: ${meetingTz}`;
  }
  panel.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
};

window.cancelFinalize = function() {
  pendingFinalize = null;
  const panel = document.getElementById('finalize-panel');
  if (panel) panel.style.display = 'none';
};

window.confirmFinalize = async function() {
  if (!pendingFinalize) return;
  const duration = document.getElementById('finalize-duration').value;
  const note = document.getElementById('finalize-note').value;
  const { ok, data } = await apiFetch(`/api/meeting/${M.id}/finalize`, {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({
      date_or_day: pendingFinalize.date,
      time_slot: pendingFinalize.time,
      duration_minutes: parseInt(duration),
      note,
    }),
  });
  if (ok && data.success) window.location.reload();
  else showFlash(data.error || 'Failed to finalize. Please try again.', 'danger');
};
</script>
